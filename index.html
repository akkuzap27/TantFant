<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tant Fant Board Game</title>
    <style>
        :root {
            --bg-color: #f4efe6;
            --board-color: #e2d4b7;
            --line-color: #5a4a42;
            --green-piece: #2ecc71;
            --green-hover: #27ae60;
            --yellow-piece: #f1c40f;
            --yellow-hover: #f39c12;
            --text-color: #3e2723;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 450px;
        }

        .mode-selector, .difficulty-selector {
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.05);
            padding: 5px;
            border-radius: 30px;
        }

        .difficulty-container, .online-container {
            display: none;
            animation: fadeIn 0.3s ease forwards;
            width: 100%;
            justify-content: center;
        }

        .difficulty-container.show, .online-container.show {
            display: flex;
        }

        .online-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0,0,0,0.03);
            padding: 15px;
            border-radius: 14px;
            width: 100%;
            max-width: 320px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .online-panel input {
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
            text-align: center;
            font-size: 0.9rem;
        }

        #connectedBadge {
            display: none;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: rgba(46, 204, 113, 0.12);
            border: 1.5px solid rgba(46, 204, 113, 0.45);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e824c;
            user-select: none;
            transition: background 0.2s, transform 0.15s;
            align-self: flex-start;
        }
        #connectedBadge:hover { background: rgba(46, 204, 113, 0.22); transform: scale(1.03); }
        #toggleArrow { font-size: 0.72rem; opacity: 0.65; transition: transform 0.2s; }

        .online-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: none;
            border: none;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn.active {
            background-color: var(--line-color);
            color: var(--bg-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        .diff-btn.active.easy { background-color: #2ecc71; color: white; }
        .diff-btn.active.hard { background-color: #e74c3c; color: white; }
        .action-btn { background-color: var(--line-color); color: var(--bg-color); }

        #status {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(0,0,0,0.05);
            text-align: center;
            transition: all 0.3s ease;
        }

        .board-container {
            position: relative;
            width: 90vw;
            height: 90vw;
            max-width: 450px;
            max-height: 450px;
            background-color: var(--board-color);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(90, 74, 66, 0.3);
        }

        .board-lines {
            position: absolute;
            top: 40px;
            left: 40px;
            width: calc(100% - 80px);
            height: calc(100% - 80px);
            pointer-events: none;
        }

        .board-lines line {
            stroke: var(--line-color);
            stroke-width: 6;
            stroke-linecap: round;
        }

        .nodes-container {
            position: absolute;
            top: 40px;
            left: 40px;
            width: calc(100% - 80px);
            height: calc(100% - 80px);
            z-index: 2;
        }

        .node {
            position: absolute;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transform: translate(-50%, -50%);
        }

        .node[data-index="0"] { top: 0%; left: 0%; }
        .node[data-index="1"] { top: 0%; left: 50%; }
        .node[data-index="2"] { top: 0%; left: 100%; }
        .node[data-index="3"] { top: 50%; left: 0%; }
        .node[data-index="4"] { top: 50%; left: 50%; }
        .node[data-index="5"] { top: 50%; left: 100%; }
        .node[data-index="6"] { top: 100%; left: 0%; }
        .node[data-index="7"] { top: 100%; left: 50%; }
        .node[data-index="8"] { top: 100%; left: 100%; }

        .node.valid-target::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: rgba(255, 255, 255, 0.7);
            border: 3px dashed var(--line-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .piece {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2), inset 0 -4px 0 rgba(0,0,0,0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            z-index: 3;
        }

        .piece.green { background-color: var(--green-piece); border: 3.5px solid #1e824c; }
        .piece.yellow { background-color: var(--yellow-piece); border: 3.5px solid #d4ac0d; }
        .piece.selected {
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.4), inset 0 -4px 0 rgba(0,0,0,0.2);
            animation: float 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        @keyframes float {
            0% { transform: scale(1.15) translateY(0px); }
            50% { transform: scale(1.15) translateY(-4px); }
            100% { transform: scale(1.15) translateY(0px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show { display: flex; opacity: 1; }

        .modal-content {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .modal.show .modal-content { transform: scale(1); }
        .modal h2 { font-size: 2.2rem; margin-bottom: 15px; }

        .reset-btn {
            background-color: var(--line-color);
            color: var(--bg-color);
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 15px;
        }
        .reset-btn:hover { background-color: #3e2723; }

        .color-choice-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .choice-btn {
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            box-shadow: 0 3px 6px rgba(0,0,0,0.16);
            transition: transform 0.1s ease;
        }
        .choice-btn:active { transform: scale(0.95); }
        .choice-btn.green-choice { background-color: var(--green-piece); }
        .choice-btn.yellow-choice { background-color: var(--yellow-piece); color: #3e2723; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

    <header>
        <h1>TANT FANT</h1>
    </header>

    <div class="controls-panel">
        <div class="mode-selector">
            <button class="btn mode-btn" id="vsCpuBtn" onclick="setGameMode('vsCpu')">vs PC</button>
            <button class="btn mode-btn active" id="vsLocalBtn" onclick="setGameMode('vsLocal')">2 Players</button>
            <button class="btn mode-btn" id="vsOnlineBtn" onclick="setGameMode('vsOnline')">Online 🌐</button>
        </div>

        <div class="difficulty-container" id="diffContainer">
            <div class="difficulty-selector">
                <button class="btn diff-btn easy" id="btn-easy" onclick="setDifficulty('easy')">Easy</button>
                <button class="btn diff-btn hard active" id="btn-hard" onclick="setDifficulty('hard')">Hardcore AI</button>
            </div>
        </div>

        <div class="online-container" id="onlineContainer" style="flex-direction:column;align-items:flex-start;">
            <div id="connectedBadge" onclick="toggleOnlinePanel()">
                <span>🟢 Connected</span>
                <span id="toggleArrow">▾</span>
            </div>
            <div class="online-panel" id="onlinePanel">
                <div style="font-size:0.78rem;color:#888;text-align:center;">Choose a room code &amp; share it with your friend</div>
                <input type="text" id="roomCodeInput" placeholder="e.g. TANT007" maxlength="20"
                    style="text-transform:uppercase;letter-spacing:2px;font-weight:700;"
                    oninput="this.value=this.value.toUpperCase()">
                <div class="online-actions">
                    <button class="btn action-btn" onclick="createRoom()">Create 🟢</button>
                    <button class="btn action-btn" onclick="joinRoom()">Join 🟡</button>
                </div>
                <div id="connectionStatus" style="font-size:0.78rem;text-align:center;color:#888;min-height:1.2em;"></div>
            </div>
        </div>
    </div>

    <div id="status">Green's Turn</div>
    <div id="scoreBoard" style="display:none;align-items:center;gap:18px;font-size:0.95rem;font-weight:700;padding:5px 18px;background:rgba(0,0,0,0.05);border-radius:20px;margin-bottom:10px;letter-spacing:0.5px;">
        <span style="color:var(--green-hover);">🟢 Green: <span id="scoreGreenVal">0</span></span>
        <span style="opacity:0.25;font-size:1.1rem;">|</span>
        <span style="color:var(--yellow-hover);">🟡 Yellow: <span id="scoreYellowVal">0</span></span>
    </div>

    <div class="board-container">
        <svg class="board-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
            <line x1="0" y1="0" x2="100" y2="0" /><line x1="0" y1="50" x2="100" y2="50" /><line x1="0" y1="100" x2="100" y2="100" />
            <line x1="0" y1="0" x2="0" y2="100" /><line x1="50" y1="0" x2="50" y2="100" /><line x1="100" y1="0" x2="100" y2="100" />
            <line x1="0" y1="0" x2="100" y2="100" /><line x1="100" y1="0" x2="0" y2="100" />
        </svg>

        <div class="nodes-container" id="boardMesh">
            <div class="node" data-index="0"></div><div class="node" data-index="1"></div><div class="node" data-index="2"></div>
            <div class="node" data-index="3"></div><div class="node" data-index="4"></div><div class="node" data-index="5"></div>
            <div class="node" data-index="6"></div><div class="node" data-index="7"></div><div class="node" data-index="8"></div>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2 id="winMessage">Green Wins!</h2>
            <div style="display:flex;gap:10px;justify-content:center;margin-top:18px;">
                <button class="reset-btn" id="modalRestartBtn" onclick="restartGame()">Restart</button>
                <button class="reset-btn" id="modalCloseBtn" onclick="closeWinModal()" style="background:rgba(90,74,66,0.15);color:var(--text-color);">Close</button>
            </div>
        </div>
    </div>

    <div class="modal" id="choiceModal">
        <div class="modal-content">
            <h2>Green or Yellow?</h2>
            <div class="color-choice-container">
                <button class="choice-btn green-choice" onclick="selectUserColor('green')">Green</button>
                <button class="choice-btn yellow-choice" onclick="selectUserColor('yellow')">Yellow</button>
            </div>
        </div>
    </div>

    <script>


        const adjacencyMap = {
            0: [1, 3, 4], 1: [0, 2, 4], 2: [1, 4, 5],
            3: [0, 4, 6], 4: [0, 1, 2, 3, 5, 6, 7, 8], 5: [2, 4, 8],
            6: [3, 4, 7], 7: [6, 4, 8], 8: [7, 4, 5]
        };

        const winLines = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        let gameState = Array(9).fill(null); 
        let currentTurn = 'green'; 
        let gameMode = 'vsLocal'; 
        let aiDifficulty = 'hard'; 
        let selectedNodeIndex = null;
        let isAiThinking = false;
        let humanPlayerColor = 'green';

        // Score tracking
        let scoreGreen = 0;
        let scoreYellow = 0;

        // Online (PeerJS) State
        let peer = null;
        let conn = null;
        let myOnlineRole = null; // 'green' (creator) or 'yellow' (joiner)
        let p2Joined = false;

        const nodeElements = document.querySelectorAll('.node');
        const statusDisplay = document.getElementById('status');
        const winModal = document.getElementById('winModal');
        const winMessage = document.getElementById('winMessage');
        const diffContainer = document.getElementById('diffContainer');
        const onlineContainer = document.getElementById('onlineContainer');
        const choiceModal = document.getElementById('choiceModal');

        function setGameMode(mode) {
            if (isAiThinking) return;
            cleanOnlinePolling();
            gameMode = mode;
            
            document.getElementById('vsCpuBtn').classList.toggle('active', mode === 'vsCpu');
            document.getElementById('vsLocalBtn').classList.toggle('active', mode === 'vsLocal');
            document.getElementById('vsOnlineBtn').classList.toggle('active', mode === 'vsOnline');
            
            diffContainer.classList.toggle('show', mode === 'vsCpu');
            onlineContainer.classList.toggle('show', mode === 'vsOnline');
            
            document.getElementById('modalRestartBtn').style.display = 'block';
            document.getElementById('modalCloseBtn').style.display = (mode === 'vsOnline') ? 'block' : 'none';
            initGame();
        }

        function setDifficulty(level) {
            if (isAiThinking) return;
            aiDifficulty = level;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${level}`).classList.add('active');
            initGame();
        }

        function initGame() {
            gameState = Array(9).fill(null);
            gameState[0] = 'yellow'; gameState[1] = 'yellow'; gameState[2] = 'yellow'; 
            gameState[6] = 'green'; gameState[7] = 'green'; gameState[8] = 'green'; 
            currentTurn = 'green';
            selectedNodeIndex = null;
            isAiThinking = false;
            
            if (gameMode === 'vsOnline') {
                statusDisplay.textContent = "Enter a room code to play!";
                statusDisplay.style.color = "var(--text-color)";
                renderBoard();
            } else if (gameMode === 'vsCpu') {
                choiceModal.classList.add('show');
            } else {
                updateStatusUI();
                renderBoard();
            }
        }

        function selectUserColor(color) {
            humanPlayerColor = color;
            choiceModal.classList.remove('show');
            updateStatusUI();
            renderBoard();
            if (humanPlayerColor === 'yellow') {
                isAiThinking = true;
                setTimeout(makeCpuMove, 600);
            }
        }

        function resetGame() {
            winModal.classList.remove('show');
            initGame();
        }

        function renderBoard() {
            nodeElements.forEach((node, index) => {
                node.innerHTML = '';
                node.classList.remove('valid-target');
                const pieceColor = gameState[index];
                if (pieceColor) {
                    const piece = document.createElement('div');
                    piece.classList.add('piece', pieceColor);
                    if (index === selectedNodeIndex) piece.classList.add('selected');
                    node.appendChild(piece);
                }
            });
        }

        function updateStatusUI() {
            if (gameMode === 'vsOnline') {
                if (!p2Joined) {
                    statusDisplay.textContent = "Waiting for Player 2 to join...";
                    statusDisplay.style.color = "var(--text-color)";
                } else {
                    if (currentTurn === myOnlineRole) {
                        statusDisplay.textContent = `Your Turn (${myOnlineRole.toUpperCase()})`;
                    } else {
                        statusDisplay.textContent = "Waiting for Opponent move...";
                    }
                    statusDisplay.style.color = currentTurn === 'green' ? 'var(--green-hover)' : 'var(--yellow-hover)';
                }
                return;
            }

            if (gameMode === 'vsCpu' && currentTurn !== humanPlayerColor) {
                statusDisplay.textContent = "Computer is calculating paths...";
            } else {
                statusDisplay.textContent = `${currentTurn.charAt(0).toUpperCase() + currentTurn.slice(1)}'s Turn`;
            }
            statusDisplay.style.color = currentTurn === 'green' ? 'var(--green-hover)' : 'var(--yellow-hover)';
        }

        function highlightValidMoves() {
            nodeElements.forEach(node => node.classList.remove('valid-target'));
            if (selectedNodeIndex !== null) {
                const possibleMoves = adjacencyMap[selectedNodeIndex];
                possibleMoves.forEach(index => {
                    if (gameState[index] === null) {
                        nodeElements[index].classList.add('valid-target');
                    }
                });
            }
        }

        nodeElements.forEach(node => {
            node.addEventListener('click', () => {
                if (gameMode === 'vsCpu' && currentTurn !== humanPlayerColor || isAiThinking) return;
                if (gameMode === 'vsOnline' && (currentTurn !== myOnlineRole || !p2Joined)) return;

                const clickedIndex = parseInt(node.getAttribute('data-index'));
                const occupant = gameState[clickedIndex];

                if (occupant === currentTurn) {
                    selectedNodeIndex = (selectedNodeIndex === clickedIndex) ? null : clickedIndex;
                    highlightValidMoves();
                    renderBoard();
                } 
                else if (selectedNodeIndex !== null && occupant === null) {
                    if (adjacencyMap[selectedNodeIndex].includes(clickedIndex)) {
                        makeMove(selectedNodeIndex, clickedIndex);
                    }
                }
            });
        });

        function makeMove(fromIndex, toIndex) {
            gameState[toIndex] = currentTurn;
            gameState[fromIndex] = null;
            selectedNodeIndex = null;
            renderBoard();
            
            if (checkWin(gameState, currentTurn)) {
                // Local player made the winning move — increment score
                if (currentTurn === 'green') scoreGreen++; else scoreYellow++;
                updateScoreDisplay();
                handleEndGame(currentTurn, false); // false = already incremented
                if (gameMode === 'vsOnline') pushOnlineState(true); // send with scores
            } else {
                currentTurn = currentTurn === 'green' ? 'yellow' : 'green';
                updateStatusUI();
                
                if (gameMode === 'vsCpu' && currentTurn !== humanPlayerColor) {
                    isAiThinking = true;
                    setTimeout(makeCpuMove, 600); 
                } else if (gameMode === 'vsOnline') {
                    pushOnlineState();
                }
            }
        }

        function checkWin(board, player) {
            return winLines.some(line => {
                const completesLine = line.every(index => board[index] === player);
                if (completesLine) {
                    if (player === 'yellow' && line.every(i => i < 3)) return false; 
                    if (player === 'green' && line.every(i => i > 5)) return false;
                    return true;
                }
                return false;
            });
        }

        function handleEndGame(winner, shouldIncrement = true) {
            if (shouldIncrement) {
                if (winner === 'green') scoreGreen++; else scoreYellow++;
                updateScoreDisplay();
                if (gameMode === 'vsOnline' && conn && conn.open) {
                    conn.send({ type: 'scoreUpdate', scoreGreen, scoreYellow });
                }
            }
            winMessage.textContent = `${winner.charAt(0).toUpperCase() + winner.slice(1)} Wins! 🎉`;
            winModal.classList.add('show');
        }

        function updateScoreDisplay() {
            document.getElementById('scoreGreenVal').textContent = scoreGreen;
            document.getElementById('scoreYellowVal').textContent = scoreYellow;
            document.getElementById('scoreBoard').style.display = 'flex';
        }

        function restartGame() {
            winModal.classList.remove('show');
            if (gameMode === 'vsOnline') {
                resetBoardOnly();
                if (conn && conn.open) conn.send({ type: 'restart', scoreGreen, scoreYellow });
            } else {
                scoreGreen = 0; scoreYellow = 0; // reset scores for local modes
                document.getElementById('scoreBoard').style.display = 'none';
                resetGame();
            }
        }

        function closeWinModal() {
            winModal.classList.remove('show');
            if (gameMode === 'vsOnline') {
                // Notify opponent to leave too, then disconnect after short delay
                if (conn && conn.open) conn.send({ type: 'leave' });
                scoreGreen = 0;
                scoreYellow = 0;
                document.getElementById('scoreBoard').style.display = 'none';
                setTimeout(() => setGameMode('vsLocal'), 300);
            }
        }

        function resetBoardOnly() {
            gameState = Array(9).fill(null);
            gameState[0] = 'yellow'; gameState[1] = 'yellow'; gameState[2] = 'yellow';
            gameState[6] = 'green';  gameState[7] = 'green';  gameState[8] = 'green';
            currentTurn = 'green';
            selectedNodeIndex = null;
            updateStatusUI();
            renderBoard();
        }

        function makeCpuMove() {
            if (!isAiThinking) return;
            
            const cpuColor = humanPlayerColor === 'green' ? 'yellow' : 'green';
            const legalMoves = [];
            
            gameState.forEach((occupant, index) => {
                if (occupant === cpuColor) {
                    adjacencyMap[index].forEach(target => {
                        if (gameState[target] === null) {
                            legalMoves.push({ from: index, to: target });
                        }
                    });
                }
            });

            if (legalMoves.length === 0) {
                isAiThinking = false;
                currentTurn = humanPlayerColor;
                updateStatusUI();
                return;
            }

            let selectedMove = null;

            if (aiDifficulty === 'hard') {
                // --- UNBEATABLE MINIMAX ENGINE ---
                let bestScore = -Infinity;
                let movesWithScores = [];

                for (const move of legalMoves) {
                    const tempBoard = [...gameState];
                    tempBoard[move.to] = cpuColor;
                    tempBoard[move.from] = null;
                    
                    // Evaluate this entire move branch recursively (Up to 8 plies deep to guarantee perfect endgame play)
                    let score = minimax(tempBoard, 0, false, cpuColor, humanPlayerColor);
                    
                    if (score > bestScore) {
                        bestScore = score;
                        selectedMove = move;
                    }
                }
            } else {
                // Easy Mode: Pick a random move
                selectedMove = legalMoves[Math.floor(Math.random() * legalMoves.length)];
            }

            isAiThinking = false;
            makeMove(selectedMove.from, selectedMove.to);
        }

        // Recursive Minimax implementation for zero-sum perfect play
        function minimax(board, depth, isMaximizing, cpuColor, humanColor) {
            if (checkWin(board, cpuColor)) return 10 - depth;
            if (checkWin(board, humanColor)) return depth - 10;
            if (depth >= 7) return 0; // Cutoff evaluation safety anchor

            const activeColor = isMaximizing ? cpuColor : humanColor;
            const availableMoves = [];

            board.forEach((occupant, index) => {
                if (occupant === activeColor) {
                    adjacencyMap[index].forEach(target => {
                        if (board[target] === null) {
                            availableMoves.push({ from: index, to: target });
                        }
                    });
                }
            });

            if (availableMoves.length === 0) return 0;

            if (isMaximizing) {
                let maxEval = -Infinity;
                for (const move of availableMoves) {
                    const nextBoard = [...board];
                    nextBoard[move.to] = cpuColor;
                    nextBoard[move.from] = null;
                    let evaluation = minimax(nextBoard, depth + 1, false, cpuColor, humanColor);
                    maxEval = Math.max(maxEval, evaluation);
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (const move of availableMoves) {
                    const nextBoard = [...board];
                    nextBoard[move.to] = humanColor;
                    nextBoard[move.from] = null;
                    let evaluation = minimax(nextBoard, depth + 1, true, cpuColor, humanColor);
                    minEval = Math.min(minEval, evaluation);
                }
                return minEval;
            }
        }

        // --- PeerJS Online Multiplayer Engine (Custom Room Codes) ---
        function createRoom() {
            const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (!code) { alert('Please enter a room code.'); return; }

            document.getElementById('connectionStatus').textContent = 'Creating room...';
            if (peer && !peer.destroyed) peer.destroy();

            peer = new Peer(code);
            myOnlineRole = 'green';

            peer.on('open', (id) => {
                document.getElementById('connectionStatus').textContent = `✅ Room "${id}" ready! Waiting for friend...`;
                statusDisplay.textContent = 'Waiting for opponent to join...';
            });
            peer.on('connection', (connection) => {
                conn = connection;
                myOnlineRole = 'green';
                p2Joined = true;
                setupConnection(true);
            });
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    document.getElementById('connectionStatus').textContent = '⚠️ Code already taken! Try another.';
                } else {
                    document.getElementById('connectionStatus').textContent = '⚠️ Error: ' + err.type;
                }
            });
        }

        function joinRoom() {
            const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (!code) { alert('Please enter the room code.'); return; }

            document.getElementById('connectionStatus').textContent = 'Joining room...';
            if (peer && !peer.destroyed) peer.destroy();

            peer = new Peer(); // joiner gets auto-ID; connects TO the creator's code
            myOnlineRole = 'yellow';

            peer.on('open', () => {
                conn = peer.connect(code, { reliable: true });
                setupConnection(false);
                document.getElementById('connectionStatus').textContent = 'Connecting...';
            });
            peer.on('error', (err) => {
                if (err.type === 'peer-unavailable') {
                    document.getElementById('connectionStatus').textContent = '⚠️ Room not found! Check the code.';
                } else {
                    document.getElementById('connectionStatus').textContent = '⚠️ Error: ' + err.type;
                }
            });
        }

        function setupConnection(isCreator) {
            conn.on('open', () => {
                p2Joined = true;
                document.getElementById('connectionStatus').textContent = '✅ Connected!';
                if (isCreator) {
                    // Creator (Green) sends the initial board state
                    conn.send({ type: 'init', gameState: gameState, currentTurn: currentTurn });
                }
                updateStatusUI();
                // Collapse panel to badge after short delay
                setTimeout(() => {
                    document.getElementById('onlinePanel').style.display = 'none';
                    document.getElementById('connectedBadge').style.display = 'flex';
                    document.getElementById('toggleArrow').textContent = '▾';
                }, 900);
            });
            conn.on('data', (data) => {
                if (data.type === 'init' || data.type === 'move') {
                    gameState = data.gameState;
                    currentTurn = data.currentTurn;
                    // Opponent sent updated scores (they made winning move)
                    if (data.scoreGreen !== undefined) {
                        scoreGreen = data.scoreGreen;
                        scoreYellow = data.scoreYellow;
                        updateScoreDisplay();
                    }
                    selectedNodeIndex = null;
                    renderBoard();
                    updateStatusUI();
                    // Opponent made winning move — show modal but don't re-increment
                    if (checkWin(gameState, 'green')) handleEndGame('green', false);
                    if (checkWin(gameState, 'yellow')) handleEndGame('yellow', false);
                }
                if (data.type === 'scoreUpdate') {
                    scoreGreen = data.scoreGreen;
                    scoreYellow = data.scoreYellow;
                    updateScoreDisplay();
                }
                if (data.type === 'restart') {
                    scoreGreen = data.scoreGreen;
                    scoreYellow = data.scoreYellow;
                    updateScoreDisplay();
                    winModal.classList.remove('show');
                    resetBoardOnly();
                }
                if (data.type === 'leave') {
                    // Other player closed the game — we leave too
                    scoreGreen = 0;
                    scoreYellow = 0;
                    document.getElementById('scoreBoard').style.display = 'none';
                    winModal.classList.remove('show');
                    setGameMode('vsLocal');
                }
            });
            conn.on('close', () => {
                p2Joined = false;
                statusDisplay.textContent = "Opponent disconnected.";
                statusDisplay.style.color = "var(--text-color)";
            });
        }

        function copyPeerId() {} // legacy stub — no longer used

        function toggleOnlinePanel() {
            const panel = document.getElementById('onlinePanel');
            const arrow = document.getElementById('toggleArrow');
            const isHidden = panel.style.display === 'none';
            panel.style.display = isHidden ? '' : 'none';
            arrow.textContent = isHidden ? '▴' : '▾';
        }

        function cleanOnlinePolling() {
            if (conn) { try { conn.close(); } catch(e){} conn = null; }
            if (peer && !peer.destroyed) { try { peer.destroy(); } catch(e){} }
            peer = null;
            myOnlineRole = null;
            p2Joined = false;
            const s = document.getElementById('connectionStatus');
            if (s) s.textContent = '';
            const badge = document.getElementById('connectedBadge');
            if (badge) badge.style.display = 'none';
            const panel = document.getElementById('onlinePanel');
            if (panel) panel.style.display = '';
        }

        function pushOnlineState(withScores = false) {
            if (conn && conn.open) {
                const payload = { type: 'move', gameState: gameState, currentTurn: currentTurn };
                if (withScores) { payload.scoreGreen = scoreGreen; payload.scoreYellow = scoreYellow; }
                conn.send(payload);
            }
        }

        window.onload = () => {
            initGame();
        };
    </script>
